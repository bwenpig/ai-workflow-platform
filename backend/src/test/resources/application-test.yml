spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: ai-workflow-platform-test
  
  data:
    mongodb:
      # 使用嵌入式 MongoDB 进行测试
      uri: mongodb://localhost:27017/ai-workflow-test
      database: ai-workflow-test
    
    redis:
      host: localhost
      port: 6379
      password: 
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: workflow-engine-test
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 0  # 随机端口

# 禁用外部 API 调用进行测试
model:
  kling:
    api-url: http://localhost:9999
    api-key: test-key
  
  wan:
    api-url: http://localhost:9999
    api-key: test-key
    model-version: wanx-v1
  
  seedance:
    api-url: http://localhost:9999
    api-key: test-key
  
  nanobanana:
    api-url: http://localhost:9999
    api-key: test-key

# MinIO 测试配置
minio:
  endpoint: http://localhost:9999
  access-key: test-access-key
  secret-key: test-secret-key
  bucket: test-workflow-outputs

# WebSocket 测试配置
websocket:
  enabled: true
  path: /ws

# 测试日志配置
logging:
  level:
    com.ben.workflow: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
